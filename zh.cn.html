<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>TACS AI Chat | TACS Studio - 免费在线智能对话，支持多模型聊天</title>
    <meta name="description" content="TACS AI Chat由TACS Studio开发，免费在线智能对话工具，支持自定义AI人设，切换Spark、GLM、Quark大模型，实时Markdown渲染对话，支持夜间深色模式，手机电脑均可流畅使用。">
    <meta name="keywords" content="AI聊天,在线智能对话,Spark大模型,GLM对话,Quark大模型,自定义AI人设,免费AI聊天,TACS AI Chat">
    <meta name="robots" content="index,follow">
    <meta name="author" content="TACS Studio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="alternate" hreflang="en" href="index.html">
    <link rel="alternate" hreflang="zh-CN" href="zh.cn.html">
    <link rel="alternate" hreflang="zh-TW" href="zh.tw.html">

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">

    <meta property="og:type" content="website">
    <meta property="og:title" content="TACS AI Chat | TACS Studio - 免费在线智能多模型对话工具">
    <meta property="og:description" content="免费在线AI对话平台，自定义人设、切换Spark/GLM/Quark三大模型，实时对话、支持Markdown、深色夜间模式，全设备适配。">
    <meta property="og:locale" content="zh_CN">

    <!-- CDN 域名预解析，提升资源加载速度 -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>
<body
    data-think="正在思考..."
    data-error="出现错误，请稍后重试。"
    data-tip="AI生成内容仅供参考。"
    data-role-prompt="输入自定义AI全局人设（清空保存即可恢复自由对话）："
    data-role-cleared="已清空全局人设，恢复自由全能对话"
    data-role-saved="自定义人设已保存，后续对话自动生效">

    <header>
        <button type="button" class="menu" id="menuBtn" aria-label="打开菜单">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
        <div class="logo">TACS AI Chat</div>
        <a href="https://github.com/TACS-Studio/tacs-pentest-kit" target="_blank" rel="noopener noreferrer" class="git-link" aria-label="GitHub 仓库">
            <i class="fa-brands fa-github" aria-hidden="true"></i>
        </a>
    </header>

    <nav id="drop" aria-label="主导航菜单">
        <div class="item" id="darkToggle" role="button" tabindex="0" aria-label="切换夜间模式">
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
            <span>夜间模式</span>
        </div>

        <div class="item" id="langOpen" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true" aria-label="语言选择">
            <i class="fa-solid fa-language" aria-hidden="true"></i>
            <span>语言选择</span>
        </div>
        <div class="sub" id="List1" role="menu">
            <a href="index.html" class="item" role="menuitem">English</a>
            <div class="item active" role="menuitem" aria-current="true">简体中文</div>
            <a href="zh.tw.html" class="item" role="menuitem">繁體中文</a>
        </div>

        <div class="item" id="modelOpen" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true" aria-label="模型选择">
            <i class="fa-solid fa-brain" aria-hidden="true"></i>
            <span>模型选择</span>
        </div>
        <div class="sub" id="List2" role="menu">
            <div class="item active" data-key="glm" role="menuitemradio" aria-checked="true">GLM</div>
            <div class="item" data-key="spark" role="menuitemradio" aria-checked="false">Spark</div>
            <div class="item" data-key="quark" role="menuitemradio" aria-checked="false">Quark</div>
            <a class="item" href="web/draw.html" role="menuitem">Draw</a>
        </div>

        <div class="item" id="setRoleBtn" role="button" tabindex="0" aria-label="人设修改">
            <i class="fa-solid fa-user-gear" aria-hidden="true"></i>
            <span>人设修改</span>
        </div>

        <div class="item">
            <a href="https://github.com/bill74186" target="_blank" rel="noopener noreferrer" aria-label="好友 bill74186 的 GitHub 主页">
                <i class="fa-solid fa-user" aria-hidden="true"></i>
                <span>好友 bill74186</span>
            </a>
        </div>

        <div class="item" id="notesOpen" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true" aria-label="使用注意">
            <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
            <span>使用注意</span>
        </div>
        <div class="sub" id="List3" role="menu">
            <div class="item active" role="menuitem">AI生成内容仅供参考，请自行判断。</div>
            <div class="item" role="menuitem">请勿输入敏感个人信息或隐私数据。</div>
            <div class="item" role="menuitem">不同模型能力各异，请按场景切换。</div>
        </div>
    </nav>

    <main id="chat" aria-label="AI对话聊天内容区"></main>

    <footer aria-label="消息输入发送区域">
        <input type="text" id="input" placeholder="输入你的问题..." aria-label="输入聊天消息">
        <button type="button" id="send" aria-label="发送消息">
            <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
        </button>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
