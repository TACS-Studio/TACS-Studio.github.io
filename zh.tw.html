<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TACS AI Chat | TACS Studio - 免費線上智慧對話，支援多模型聊天</title>
    <meta name="description" content="TACS AI Chat由TACS Studio開發，免費線上智慧對話工具，可自訂AI人設、切換Spark、GLM、Quark大型語言模型，對話即時渲染Markdown，支援深色夜間模式，手機電腦皆可順暢使用。">
    <meta name="keywords" content="AI聊天,線上智慧對話,Spark大型模型,GLM對話,Quark大型模型,自訂AI人設,免費AI聊天,TACS AI Chat">
    <meta name="robots" content="index,follow">
    <meta name="author" content="TACS Studio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="alternate" hreflang="en" href="index.html">
    <link rel="alternate" hreflang="zh-CN" href="zh.cn.html">
    <link rel="alternate" hreflang="zh-TW" href="zh.tw.html">

    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">

    <meta property="og:type" content="website">
    <meta property="og:title" content="TACS AI Chat | TACS Studio - 免費線上AI多模型對話工具">
    <meta property="og:description" content="免費線上AI對話平台，自訂人設、切換Spark/GLM/Quark三大模型，即時對話、支援Markdown、深色夜間模式，全裝置相容。">
    <meta property="og:locale" content="zh_TW">

    <!-- DNS 预解析，提升 CDN 资源加载速度 -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>
<body
    data-think="正在思考中..."
    data-error="發生錯誤，請稍後再試。"
    data-tip="AI產生內容僅供參考。"
    data-role-prompt="輸入自訂AI全域人設（清空並儲存即可恢復自由對話）："
    data-role-cleared="已清空全域人設，恢復自由萬能對話"
    data-role-saved="自訂人設已儲存，後續對話自動套用">

    <header>
        <button type="button" class="menu" id="menuBtn" aria-label="打开菜单">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
        <div class="logo">TACS AI Chat</div>
        <a href="https://github.com/TACS-Studio/tacs-pentest-kit" target="_blank" rel="noopener noreferrer" class="git-link" aria-label="GitHub 仓库">
            <i class="fa-brands fa-github" aria-hidden="true"></i>
        </a>
    </header>

    <nav id="drop" aria-label="主导航菜单">
        <div class="item" id="darkToggle" role="button" tabindex="0" aria-label="切换夜间模式">
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
            <span>夜間模式</span>
        </div>

        <div class="item" id="langOpen" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true" aria-label="语言选择">
            <i class="fa-solid fa-language" aria-hidden="true"></i>
            <span>語言選擇</span>
        </div>
        <div class="sub" id="List1" role="menu">
            <a href="index.html" class="item" role="menuitem">English</a>
            <a href="zh.cn.html" class="item" role="menuitem">简体中文</a>
            <div class="item active" role="menuitem" aria-current="true">繁體中文</div>
        </div>

        <div class="item" id="modelOpen" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true" aria-label="模型选择">
            <i class="fa-solid fa-brain" aria-hidden="true"></i>
            <span>模型選擇</span>
        </div>
        <div class="sub" id="List2" role="menu">
            <div class="item active" data-key="glm" role="menuitemradio" aria-checked="true">GLM</div>
            <div class="item" data-key="spark" role="menuitemradio" aria-checked="false">Spark</div>
            <div class="item" data-key="quark" role="menuitemradio" aria-checked="false">Quark</div>
            <a class="item" href="web/draw.html" role="menuitem">Draw</a>
        </div>

        <div class="item" id="setRoleBtn" role="button" tabindex="0" aria-label="人设设置">
            <i class="fa-solid fa-user-gear" aria-hidden="true"></i>
            <span>人設設定</span>
        </div>

        <div class="item">
            <a href="https://bill74186.github.io" target="_blank" rel="noopener noreferrer" aria-label="好友 bill74186 的博客">
                <i class="fa-solid fa-user" aria-hidden="true"></i>
                <span>好友 bill74186</span>
            </a>
        </div>

        <div class="item" id="notesOpen" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true" aria-label="使用须知">
            <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
            <span>使用須知</span>
        </div>
        <div class="sub" id="List3" role="menu">
            <div class="item active" role="menuitem">AI產生內容僅供參考，請自行辨識判斷。</div>
            <div class="item" role="menuitem">請勿輸入機密個人資訊或隱私資料。</div>
            <div class="item" role="menuitem">各模型功能特性不同，依使用場景切換。</div>
        </div>
    </nav>

    <main id="chat" aria-label="AI對話聊天內容區塊"></main>

    <footer aria-label="訊息輸入與傳送區域">
        <input type="text" id="input" placeholder="輸入你的問題..." aria-label="輸入聊天訊息">
        <button type="button" id="send" aria-label="傳送訊息">
            <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
        </button>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
