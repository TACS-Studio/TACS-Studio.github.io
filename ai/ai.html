<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Chat | TACS Studio</title>
    <meta name="description" content="Lightweight pure front-end AI chat page without external CSS dependency.">
    <meta name="keywords" content="simple ai chat, glm llm, vanilla js chat">
    <meta name="author" content="TACS Studio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <style>
        /* 内置极简基础样式（你原来外部css可以删掉，保留页面可用） */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            padding-top: 60px;
            padding-bottom: 60px;
            background: #fff;
            color: #111;
        }
        body.dark {
            background: #121212;
            color: #eee;
        }
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: #f5f5f5;
        }
        body.dark .top-bar {
            background: #1e1e1e;
        }
        .top-bar a {
            color: inherit;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }
        #chat {
            padding: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        .msg {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            white-space: pre-wrap;
        }
        .msg.user {
            background: #d1eaff;
            margin-left: auto;
        }
        body.dark .msg.user {
            background: #194068;
        }
        .msg.ai {
            background: #efefef;
            margin-right: auto;
        }
        body.dark .msg.ai {
            background: #2a2a2a;
        }
        .thinking {
            padding: 10px 14px;
            margin: 8px 0;
            border-radius: 12px;
            background: #efefef;
            max-width: 85%;
            margin-right: auto;
        }
        body.dark .thinking {
            background: #2a2a2a;
        }
        .input-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #f5f5f5;
        }
        body.dark .input-bar {
            background: #1e1e1e;
        }
        #userInput {
            flex: 1;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid #ccc;
            background: #fff;
            color: inherit;
        }
        body.dark #userInput {
            background: #333;
            border-color: #444;
        }
        #sendButton {
            width: 40px;
            border-radius: 50%;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        #sendButton:disabled {
            background: #88a8cc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="top-bar">
    <a href="../" aria-label="Back to homepage">AI Chat</a>
</div>
<div id="chat" aria-label="Chat message container"></div>
<div class="input-bar">
    <input type="text" id="userInput" placeholder="Type your message..." aria-label="Input chat message">
    <button type="button" id="sendButton" aria-label="Send message">↑</button>
</div>

<script>
(function () {
    'use strict';

    // HTML转义防XSS
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // DOM缓存
    const dom = {
        chat: document.getElementById('chat'),
        userInput: document.getElementById('userInput'),
        sendBtn: document.getElementById('sendButton'),
        body: document.body
    };

    // 全局状态
    const state = {
        isRequesting: false,
        typingTimer: null
    };

    // 深色模式读取（兼容整套项目dark class）
    if (localStorage.getItem("darkMode") === "on") {
        dom.body.classList.add("dark");
    }

    function scrollBottom() {
        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: 'smooth'
        });
    }

    function sendMsg() {
        const rawText = dom.userInput.value.trim();
        if (!rawText || state.isRequesting) return;

        // 上锁，禁用按钮防止重复发送
        state.isRequesting = true;
        dom.sendBtn.disabled = true;

        // 清空输入框
        dom.userInput.value = "";

        // 清除上一轮残留打字定时器
        if (state.typingTimer) {
            clearInterval(state.typingTimer);
            state.typingTimer = null;
        }

        // 用户消息（安全textContent无XSS）
        const userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.textContent = rawText;
        dom.chat.appendChild(userMsg);
        scrollBottom();

        // 思考提示
        const thinkingBox = document.createElement('div');
        thinkingBox.className = 'thinking';
        thinkingBox.textContent = 'Thinking...';
        dom.chat.appendChild(thinkingBox);
        scrollBottom();

        const encodedMsg = encodeURIComponent(rawText);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        fetch(`https://api.52vmy.cn/api/chat/glm?msg=${encodedMsg}`, {
            signal: controller.signal
        })
        .then(res => res.json())
        .then(data => {
            clearTimeout(timeoutId);
            thinkingBox.remove();

            const aiText = data.data?.answer ?? "Sorry, due to restrictions, please try again later.";
            const aiBox = document.createElement('div');
            aiBox.className = 'msg ai';
            dom.chat.appendChild(aiBox);
            scrollBottom();

            let current = "";
            let idx = 0;
            state.typingTimer = setInterval(() => {
                if (idx < aiText.length) {
                    current += aiText[idx];
                    aiBox.textContent = current;
                    scrollBottom();
                    idx++;
                } else {
                    clearInterval(state.typingTimer);
                    state.typingTimer = null;
                }
            }, 10);
        })
        .catch(err => {
            clearTimeout(timeoutId);
            thinkingBox.remove();
            const errMsg = escapeHtml("An error occurred, please try again later.");
            dom.chat.innerHTML += `<div class="msg ai">${errMsg}</div>`;
            scrollBottom();
        })
        .finally(() => {
            // 解锁
            state.isRequesting = false;
            dom.sendBtn.disabled = false;
            dom.userInput.focus();
        });
    }

    // 点击发送
    dom.sendBtn.addEventListener('click', sendMsg);
    // 回车发送，Shift+Enter预留换行
    dom.userInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });
})();
</script>
</body>
</html>
